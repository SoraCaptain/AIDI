name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Container Registry
        uses: docker/login-action@v2
        with:
          registry: your-registry
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Gateway image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.gateway
          push: true
          tags: your-registry/aidi-gateway:${{ github.sha }}

      - name: Deploy to Kubernetes
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      - name: Set up kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" > kubeconfig
      - name: Apply manifests
        run: |
          export KUBECONFIG=./kubeconfig
          kubectl set image deployment/gateway-blue gateway=your-registry/aidi-gateway:${{ github.sha }} -n aidi
          # 等待 rollout 完成
          kubectl rollout status deployment/gateway-blue -n aidi
          # 切换 Service selector 到 blue
          kubectl patch service gateway-service -n aidi -p '{"spec":{"selector":{"version":"blue"}}}'