# k8s/gateway.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: aidi
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8400"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: gateway
        image: aidi-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8400
        env:
        - name: MODEL_NAME
          value: "Qwen/Qwen3.6-35B-A3B"
        - name: AIDI_USE_POSTGRES_CHECKPOINTER
          value: "true"
        - name: AIDI_POSTGRES_CHECKPOINTER_URI
          value: "postgres://aidi_user:secure_password@postgres-service:5432/aidi_checkpoints"
        - name: CV_SERVER
          value: "http://cvserver-service:8200"
        - name: GDINO_SERVER
          value: "http://gdinoserver-service:8210"
        - name: VLM_SERVER
          value: "http://vlm-service:8002"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8400
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8400
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: aidi
spec:
  selector:
    app: gateway
  ports:
    - port: 8400
      targetPort: 8400
  type: ClusterIP