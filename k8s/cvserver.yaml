# k8s/cvserver.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cvserver
  namespace: aidi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cvserver
  template:
    metadata:
      labels:
        app: cvserver
    spec:
      containers:
      - name: cvserver
        image: your-registry/aidi-cvserver:latest
        ports:
        - containerPort: 8200
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: cvserver-service
  namespace: aidi
spec:
  selector:
    app: cvserver
  ports:
    - port: 8200
  type: ClusterIP